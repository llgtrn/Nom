name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: cargo check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain from rust-toolchain.toml
        run: rustup show
      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nom-compiler/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('nom-compiler/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: cargo check --workspace
        working-directory: nom-compiler
        run: cargo check --workspace --message-format short

  test:
    name: cargo test (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      # inkwell/llvm-sys needs LLVM 18 at link + runtime for the
      # nom-llvm test exe (and nom-cli's integration-test binaries,
      # which transitively link nom-llvm). ubuntu-24.04 has llvm-18
      # in universe — one apt install is enough.
      - name: Install LLVM 18
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev libpolly-18-dev
          echo "LLVM_SYS_180_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
          echo "/usr/lib/llvm-18/bin" >> $GITHUB_PATH
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nom-compiler/target
          key: ubuntu-latest-cargo-${{ hashFiles('nom-compiler/Cargo.lock') }}
          restore-keys: ubuntu-latest-cargo-
      # Per-crate tests — the whole-workspace `cargo test` is known
      # to hit pre-existing STATUS_DLL_NOT_FOUND on Windows in
      # nom-cli integration tests, so we iterate per-crate on Linux
      # where LLVM lib resolution works.
      - name: cargo test per crate
        working-directory: nom-compiler
        run: |
          set -e
          for p in nom-types nom-dict nom-resolver nom-security nom-codegen \
                   nom-lexer nom-parser nom-ast nom-graph nom-search \
                   nom-translate nom-verifier nom-planner nom-diagnostics \
                   nom-media nom-ux nom-corpus nom-bench nom-app nom-flow; do
            echo "=== $p ==="
            cargo test -p "$p" --quiet 2>&1 | tail -5
          done

      # nom-cli integration tests: self-host parse gates, Rust↔Nom
      # parity matrix, parser subset probe, meta test. Hard-fail on
      # failure now that LLVM 18 is installed above; these tests use
      # only nom-parser / nom-types / nom-dict but the bin-crate
      # dep graph pulls nom-llvm, so the test exe needs LLVM libs
      # to even start.
      - name: cargo test nom-cli self-host + parity tests
        working-directory: nom-compiler
        run: |
          set -e
          for t in self_host_planner self_host_ast self_host_verifier \
                   self_host_codegen self_host_parser self_host_smoke \
                   self_host_meta self_host_rust_parity \
                   parser_subset_probe self_host_pipeline; do
            echo "=== nom-cli::$t ==="
            cargo test -p nom-cli --test "$t" --quiet 2>&1 | tail -5
          done

  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: rustup component add rustfmt
      - name: cargo fmt --check
        working-directory: nom-compiler
        run: cargo fmt --all -- --check
        continue-on-error: true  # advisory for now; enforce later

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: rustup component add clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nom-compiler/target
          key: ubuntu-latest-cargo-${{ hashFiles('nom-compiler/Cargo.lock') }}
      - name: cargo clippy
        working-directory: nom-compiler
        run: cargo clippy --workspace --no-deps -- -D warnings
        continue-on-error: true  # advisory; blockers will be addressed as they arise
