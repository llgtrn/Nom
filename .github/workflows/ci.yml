name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # -D warnings but allow deprecated — we have an active legacy table migration
  # where callers of deprecated functions exist intentionally until migration completes.
  RUSTFLAGS: "-D warnings -A deprecated"

jobs:
  check:
    name: cargo check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain from rust-toolchain.toml
        run: rustup show
      - name: Verify toolchain pin is honored (plan §10.3.1 Risk #1)
        working-directory: nom-compiler
        shell: bash
        run: |
          set -e
          expected="1.94.1"
          got=$(rustc --version)
          echo "rustc --version -> $got"
          echo "$got" | grep -q "rustc $expected " || {
            echo "::error::rust-toolchain.toml pins '$expected' but rustc is '$got' — §10.3.1 fixpoint prerequisite violated"
            exit 1
          }
      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nom-compiler/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('nom-compiler/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: cargo check --workspace
        working-directory: nom-compiler
        run: cargo check --workspace --message-format short

  test:
    name: cargo test (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      # inkwell/llvm-sys needs LLVM 18 at link + runtime for the
      # nom-llvm test exe (and nom-cli's integration-test binaries,
      # which transitively link nom-llvm). ubuntu-24.04 has llvm-18
      # in universe — one apt install is enough.
      - name: Install LLVM 18
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev libpolly-18-dev libdav1d-dev
          echo "LLVM_SYS_180_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
          echo "/usr/lib/llvm-18/bin" >> $GITHUB_PATH
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nom-compiler/target
          key: ubuntu-latest-cargo-${{ hashFiles('nom-compiler/Cargo.lock') }}
          restore-keys: ubuntu-latest-cargo-
      # Per-crate tests — with LLVM 18 installed above, nom-cli's
      # bin-crate tests can now run alongside the rest of the
      # workspace. Iterating per-crate keeps one bad crate from
      # poisoning the whole log and lets us see progress in CI output.
      - name: cargo test per crate
        working-directory: nom-compiler
        run: |
          set -e
          for p in nom-types nom-dict nom-resolver nom-security nom-codegen \
                   nom-ast nom-graph nom-search nom-grammar \
                   nom-translate nom-verifier nom-planner nom-diagnostics \
                   nom-media nom-ux nom-corpus nom-bench nom-app nom-flow \
                   nom-concept nom-locale nom-config nom-extract nom-score \
                   nom-runtime nom-intent nom-llvm nom-lsp nom-cli; do
            echo "=== $p ==="
            cargo test -p "$p" --quiet 2>&1 | tail -5
          done

  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: rustup component add rustfmt
      - name: cargo fmt --check
        working-directory: nom-compiler
        run: cargo fmt --all -- --check
        continue-on-error: true  # advisory for now; enforce later

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: rustup component add clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nom-compiler/target
          key: ubuntu-latest-cargo-${{ hashFiles('nom-compiler/Cargo.lock') }}
      - name: cargo clippy
        working-directory: nom-compiler
        run: cargo clippy --workspace --no-deps -- -D warnings
        continue-on-error: true  # advisory; blockers will be addressed as they arise

  canvas:
    name: NomCanvas checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: rustup show
      - name: Install frontend deps
        working-directory: nom-canvas
        run: npm install
      - name: TypeScript check
        working-directory: nom-canvas
        run: npx tsc --noEmit
      - name: Vite build
        working-directory: nom-canvas
        run: npx vite build
      - name: Tauri Rust check (no LLVM)
        working-directory: nom-canvas/src-tauri
        run: cargo check
